services:
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana

  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_CREATE_TOPICS: "weather_stream:1:1,weather_transformed:1:1"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  data-producer:
    build: ./kafka-producer
    depends_on:
      kafka:
        condition: service_healthy

  data-consumer:
    build:
      context: ./kafka-consumer
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "kafka_consumer.py", "weather_stream"]

  data-consumer-transformed:
    build:
      context: ./kafka-consumer
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "kafka_consumer.py", "weather_transformed"]

  spark-app:
    build: ./spark-app
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SOURCE_TOPIC: weather_stream
      SINK_TOPIC: weather_transformed
      CHECKPOINT_DIR: /tmp/checkpoints/weather_transformed
    depends_on:
      kafka:
        condition: service_healthy



volumes:
  grafana-storage: {}

